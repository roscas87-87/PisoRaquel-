name: Sync iCal → Firebase

on:
  schedule:
    - cron: '0 * * * *'   # cada hora
  workflow_dispatch:        # también manual desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch firebase-admin

      - name: Run iCal sync
        env:
          FIREBASE_PROJECT_ID: pisovegagranada-78a89
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          ICAL_AIRBNB: ${{ secrets.ICAL_AIRBNB }}
          ICAL_BOOKING: ${{ secrets.ICAL_BOOKING }}
        run: node sync-ical.js
